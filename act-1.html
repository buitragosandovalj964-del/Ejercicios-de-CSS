    <title>actividad 1</title>
    <style>

            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            border: 1px solid black;
            background-color: rgb(52, 5, 114);
            height: 200vh;
            
        }

        .pegajoso {
            position: sticky;
            top: 0;

            padding: 10px 14px;

            font-size: 15px;
            z-index: 10;
        }

        .estatico {
            border: 1px solid cadetblue;
            width: 220px;
            height: 50px;
            background-color: white;
            margin-top: 0px;
            color: black;
        }
    </style>
</head>

</body>
</html>
