<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>actividad 2</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: serif;
        }

        nav {
            background-color: #dda0dd;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        nav a {
            text-decoration: none;
            color: white;
            font-size: 15px;
        }

        nav a.activo {
            color: white;
            padding: 12px 20px;
            font-size: 15px;
            
        }
        nav a:hover {
            background-color: rgb(30, 30, 180);
            color: white;
        }
    </style>
</head>
<body>

    <nav>
        <a href="#" class="activo">Inicio</a>
        <a href="#">¿Quienes Somos?</a>
        <a href="#">Contacto</a>
    </nav>

</body>
</html>
